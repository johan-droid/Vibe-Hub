services:
  # ===== BACKEND: Brain v3.0 =====
  - type: web
    name: vibe-hub-brain
    runtime: node
    region: oregon
    plan: free
    rootDir: apps/server-bridge
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: vibe-hub-db
          property: connectionString
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_REDIRECT_URI
        sync: false

  # ===== FRONTEND: React SPA =====
  - type: web
    name: vibe-hub-ui
    runtime: static
    region: oregon
    plan: free
    rootDir: apps/user-interface
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: vibe-hub-db
    plan: free
    region: oregon
    databaseName: vibehub
    user: vibehub
